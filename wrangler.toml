# Cloudflare Pages config — bindings + vars for the upload Functions.
# (Build command stays in the Pages dashboard: `npm run build`.)
name = "wedding-site-8nh"
pages_build_output_dir = "dist"
compatibility_date = "2024-11-01"

# R2 bucket that holds uploaded audio + images. The Functions reach it as env.MEDIA.
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "celebrately-medias"

# Public values used by functions/api/upload.js to verify the caller's Supabase
# session before allowing an upload. These are the publishable anon URL + key —
# already shipped in the client bundle, so safe here (RLS still applies).
[vars]
SUPABASE_URL = "https://xprynknppsehuzqqdvue.supabase.co"
SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhwcnlua25wcHNlaHV6cXFkdnVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwODg1OTUsImV4cCI6MjA5NzY2NDU5NX0._S3xdNXBm6d4SI8MO0MNoZ3bT8uspEd8lrdVm29Efgo"
